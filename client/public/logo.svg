<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120">
  <defs>
    <!-- Cyan paddle glow -->
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Magenta paddle glow -->
    <filter id="glow-magenta" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Ball glow -->
    <filter id="glow-ball" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Text glow -->
    <filter id="glow-text" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Ball trail gradient -->
    <linearGradient id="trail" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect width="520" height="120" rx="16" fill="#0a0a2e"/>

  <!-- Subtle center line -->
  <line x1="60" y1="16" x2="60" y2="104" stroke="#6b21a8" stroke-width="1" stroke-dasharray="4 4" opacity="0.25"/>

  <!-- Left paddle (cyan) -->
  <rect x="18" y="28" width="6" height="64" rx="3" fill="#00f5ff" filter="url(#glow-cyan)"/>

  <!-- Right paddle (magenta) -->
  <rect x="96" y="28" width="6" height="64" rx="3" fill="#ff00e5" filter="url(#glow-magenta)"/>

  <!-- Ball trail -->
  <ellipse cx="62" cy="60" rx="18" ry="5" fill="url(#trail)" opacity="0.4"/>

  <!-- Ball -->
  <circle cx="60" cy="60" r="8" fill="#ffffff" filter="url(#glow-ball)"/>

  <!-- Spark particles -->
  <circle cx="34" cy="48" r="1.5" fill="#00f5ff" opacity="0.7"/>
  <circle cx="40" cy="72" r="1" fill="#00f5ff" opacity="0.5"/>
  <circle cx="82" cy="42" r="1.2" fill="#ff00e5" opacity="0.6"/>
  <circle cx="86" cy="76" r="1" fill="#ff00e5" opacity="0.5"/>

  <!-- "CHAOS" text -->
  <text x="140" y="62" font-family="monospace, 'Courier New'" font-weight="900" font-size="44" fill="#ffffff" filter="url(#glow-text)" letter-spacing="6">CHAOS</text>

  <!-- "PONG" text -->
  <text x="370" y="62" font-family="monospace, 'Courier New'" font-weight="900" font-size="44" letter-spacing="6">
    <tspan fill="#00f5ff">PO</tspan><tspan fill="#ff00e5">NG</tspan>
  </text>

  <!-- Tagline -->
  <text x="260" y="92" font-family="monospace, 'Courier New'" font-size="11" fill="#6b7280" text-anchor="middle" letter-spacing="3">REAL-TIME MULTIPLAYER MAYHEM</text>
</svg>
